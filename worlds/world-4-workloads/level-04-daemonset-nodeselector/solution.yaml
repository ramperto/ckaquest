apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-monitor
  namespace: ckaquest
spec:
  selector:
    matchLabels:
      app: node-monitor
  template:
    metadata:
      labels:
        app: node-monitor
    spec:
      tolerations:
        - operator: Exists
      # nodeSelector removed — schedules on all nodes
      containers:
        - name: monitor
          image: busybox:1.36
          command: ["sh", "-c", "while true; do echo monitoring; sleep 30; done"]
