apiVersion: v1
kind: Pod
metadata:
  name: resource-pod
  namespace: ckaquest
spec:
  containers:
    - name: nginx
      image: nginx:1.25
      ports:
        - containerPort: 80
      resources:
        requests:
          memory: 64Mi
          cpu: 50m
        limits:
          # FIX: limits >= requests
          memory: 128Mi
          cpu: 100m
