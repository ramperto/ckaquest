apiVersion: v1
kind: Pod
metadata:
  name: app-with-sidecar
  namespace: ckaquest
spec:
  initContainers:
    - name: log-agent
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          while true; do
            echo "$(date) collecting logs..." >> /var/log/app/agent.log
            sleep 5
          done
      # BUG: missing restartPolicy: Always
      # Without it, this is a regular init container.
      # The infinite loop means it never completes,
      # so the main container never starts.
      volumeMounts:
        - name: logs
          mountPath: /var/log/app
  containers:
    - name: main-app
      image: nginx:1.25
      ports:
        - containerPort: 80
      volumeMounts:
        - name: logs
          mountPath: /var/log/app
  volumes:
    - name: logs
      emptyDir: {}
