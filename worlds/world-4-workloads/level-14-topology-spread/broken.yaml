apiVersion: apps/v1
kind: Deployment
metadata:
  name: spread-app
  namespace: ckaquest
spec:
  replicas: 3
  selector:
    matchLabels:
      app: spread-app
  template:
    metadata:
      labels:
        app: spread-app
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
      topologySpreadConstraints:
        - maxSkew: 1
          # BUG: this topology key doesn't exist on any node
          topologyKey: topology.kubernetes.io/rack
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: spread-app
