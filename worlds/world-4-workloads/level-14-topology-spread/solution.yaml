apiVersion: apps/v1
kind: Deployment
metadata:
  name: spread-app
  namespace: ckaquest
spec:
  replicas: 3
  selector:
    matchLabels:
      app: spread-app
  template:
    metadata:
      labels:
        app: spread-app
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
      topologySpreadConstraints:
        - maxSkew: 1
          # FIX: use a topology key that exists on nodes
          topologyKey: kubernetes.io/hostname
          # FIX: ScheduleAnyway allows scheduling even if skew is exceeded
          # (necessary on single-node clusters)
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: spread-app
