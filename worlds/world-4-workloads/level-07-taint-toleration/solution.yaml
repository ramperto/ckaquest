apiVersion: v1
kind: Pod
metadata:
  name: gpu-worker
  namespace: ckaquest
  labels:
    app: gpu-worker
spec:
  tolerations:
    - key: "gpu"
      value: "present"
      effect: "NoSchedule"   # tolerate the node taint
  containers:
    - name: worker
      image: busybox:1.36
      command: ["sh", "-c", "echo 'GPU training started'; sleep 3600"]
