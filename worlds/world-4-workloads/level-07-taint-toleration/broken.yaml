apiVersion: v1
kind: Pod
metadata:
  name: gpu-worker
  namespace: ckaquest
  labels:
    app: gpu-worker
spec:
  containers:
    - name: worker
      image: busybox:1.36
      command: ["sh", "-c", "echo 'GPU training started'; sleep 3600"]
  # BUG: no toleration for the node taint gpu=present:NoSchedule
  # Pod will remain Pending indefinitely
