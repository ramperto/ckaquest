apiVersion: batch/v1
kind: CronJob
metadata:
  name: report-generator
  namespace: ckaquest
spec:
  schedule: "*/5 * * * *"   # every 5 minutes
  suspend: true              # BUG: suspended — no Jobs will be created
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: reporter
              image: busybox:1.36
              command: ["sh", "-c", "echo 'Report generated at' $(date)"]
