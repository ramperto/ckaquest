apiVersion: v1
kind: Pod
metadata:
  name: debug-pod
  namespace: ckaquest
  labels:
    app: debug
spec:
  dnsPolicy: None          # Overrides cluster DNS entirely
  dnsConfig:
    nameservers:
      - 1.2.3.4            # Non-existent nameserver — DNS will fail
    searches:
      - ckaquest.svc.cluster.local
  containers:
    - name: debug
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]
