apiVersion: v1
kind: Pod
metadata:
  name: storage-hog
  namespace: ckaquest
  labels:
    app: storage-hog
spec:
  containers:
    - name: busybox
      image: busybox:1.36
      command: ["sleep", "3600"]
      resources:
        requests:
          # BUG: 500Gi is way too much — should be 500Mi.
          # No node can satisfy this request, so the pod stays Pending
          # with "Insufficient ephemeral-storage" in events.
          ephemeral-storage: 500Gi
