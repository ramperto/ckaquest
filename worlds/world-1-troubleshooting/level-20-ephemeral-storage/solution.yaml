# Level 20 Solution: Excessive Ephemeral Storage Request
#
# Step 1: Delete the broken pod
# kubectl delete pod storage-hog -n ckaquest
#
# Step 2: Apply the fixed manifest with 500Mi instead of 500Gi
# kubectl apply -f solution.yaml
---
apiVersion: v1
kind: Pod
metadata:
  name: storage-hog
  namespace: ckaquest
  labels:
    app: storage-hog
spec:
  containers:
    - name: busybox
      image: busybox:1.36
      command: ["sleep", "3600"]
      resources:
        requests:
          ephemeral-storage: 500Mi
