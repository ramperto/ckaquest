apiVersion: v1
kind: Pod
metadata:
  name: backend
  namespace: ckaquest
  labels:
    app: backend
    tier: backend
spec:
  containers:
    - name: backend
      image: nginx:1.25
      ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: ckaquest
spec:
  selector:
    app: backend
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: v1
kind: Pod
metadata:
  name: frontend
  namespace: ckaquest
  labels:
    app: frontend
    tier: frontend
spec:
  containers:
    - name: frontend
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]
---
# This policy blocks ALL ingress to backend pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-deny-all
  namespace: ckaquest
spec:
  podSelector:
    matchLabels:
      app: backend
  policyTypes:
    - Ingress
  ingress: []   # Empty = deny all ingress
