apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: ckaquest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: nginx:1.25
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: ckaquest
spec:
  selector:
    app: api          # BUG: should be "backend"
  ports:
    - port: 80
      targetPort: 80
