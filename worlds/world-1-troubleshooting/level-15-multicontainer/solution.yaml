apiVersion: v1
kind: Pod
metadata:
  name: web-with-sidecar
  namespace: ckaquest
  labels:
    app: web
spec:
  volumes:
    - name: shared-logs
      emptyDir: {}
  containers:
    - name: web
      image: nginx:1.25
      ports:
        - containerPort: 80
      volumeMounts:
        - name: shared-logs
          mountPath: /var/log/nginx
    - name: log-collector
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          # Wait for nginx to create log files, then tail them
          while [ ! -f /var/log/nginx/access.log ]; do
            echo "Waiting for access.log..."
            sleep 2
          done
          tail -f /var/log/nginx/access.log
      volumeMounts:
        - name: shared-logs
          mountPath: /var/log/nginx
