apiVersion: v1
kind: Pod
metadata:
  name: web-with-sidecar
  namespace: ckaquest
  labels:
    app: web
spec:
  volumes:
    - name: shared-logs
      emptyDir: {}
  containers:
    - name: web
      image: nginx:1.25
      ports:
        - containerPort: 80
      volumeMounts:
        - name: shared-logs
          mountPath: /var/log/nginx
    - name: log-collector
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          # BUG: trying to tail a file that doesn't exist yet using wrong path
          tail -f /var/log/nginx/access.log /WRONG_PATH/error.log
      volumeMounts:
        - name: shared-logs
          mountPath: /var/log/nginx
