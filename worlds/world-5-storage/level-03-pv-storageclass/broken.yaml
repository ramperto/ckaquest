apiVersion: v1
kind: PersistentVolume
metadata:
  name: app-pv
spec:
  capacity:
    storage: 3Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: standard
  hostPath:
    path: /tmp/ckaquest-app-pv
---
# BUG: PVC references storageClassName: fast-ssd but PV has storageClassName: standard
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: app-storage
  namespace: ckaquest
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: fast-ssd    # wrong — no PV or StorageClass with this name
  resources:
    requests:
      storage: 3Gi
