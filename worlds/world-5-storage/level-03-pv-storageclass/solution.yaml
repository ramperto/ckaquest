apiVersion: v1
kind: PersistentVolume
metadata:
  name: app-pv
spec:
  capacity:
    storage: 3Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: standard
  hostPath:
    path: /tmp/ckaquest-app-pv
---
# Fixed: storageClassName matches the PV
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: app-storage
  namespace: ckaquest
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard   # fixed — matches PV storageClassName
  resources:
    requests:
      storage: 3Gi
