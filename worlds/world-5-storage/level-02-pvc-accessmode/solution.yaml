apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: manual
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: Immediate
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pipeline-pv
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    path: /tmp/ckaquest-pipeline-pv
---
# Fixed: ReadWriteOnce matches the PV
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pipeline-data
  namespace: ckaquest
spec:
  accessModes:
    - ReadWriteOnce   # fixed — matches PV access mode
  storageClassName: manual
  resources:
    requests:
      storage: 5Gi
