# StorageClass required for static PV binding (no-provisioner = manual/static only)
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: manual
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: Immediate
---
# Static PV with 5Gi capacity
apiVersion: v1
kind: PersistentVolume
metadata:
  name: db-pv
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    path: /tmp/ckaquest-db-pv
---
# BUG: PVC requests 10Gi but PV only has 5Gi — will never bind
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: db-data
  namespace: ckaquest
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  resources:
    requests:
      storage: 10Gi   # too large — PV only has 5Gi
