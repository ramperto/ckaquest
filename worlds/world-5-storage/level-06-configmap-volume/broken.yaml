apiVersion: v1
kind: Pod
metadata:
  name: config-app
  namespace: ckaquest
  labels:
    app: config-app
spec:
  volumes:
    - name: config-vol
      configMap:
        name: app-config   # BUG: ConfigMap 'app-config' does not exist
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh", "-c", "echo Config: $(cat /etc/app/app.properties); sleep 3600"]
      volumeMounts:
        - name: config-vol
          mountPath: /etc/app
