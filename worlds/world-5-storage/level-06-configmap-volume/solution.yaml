# Step 1: Create the missing ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: ckaquest
data:
  app.properties: |
    log_level=INFO
    max_connections=100
---
# Step 2: The pod spec is correct — just needs the ConfigMap to exist
# After creating the ConfigMap, delete and recreate the pod:
#   kubectl delete pod config-app -n ckaquest
#   kubectl apply -f broken.yaml
apiVersion: v1
kind: Pod
metadata:
  name: config-app
  namespace: ckaquest
  labels:
    app: config-app
spec:
  volumes:
    - name: config-vol
      configMap:
        name: app-config
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh", "-c", "echo Config: $(cat /etc/app/app.properties); sleep 3600"]
      volumeMounts:
        - name: config-vol
          mountPath: /etc/app
