# The data in PVC important-data is critical. If the PVC is deleted,
# the PV and data will be lost because StorageClass delete-sc has
# reclaimPolicy: Delete.
#
# Task: Create a new StorageClass with Retain policy, create a new PVC
# using it, and migrate the Deployment to use the new PVC.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: important-data
  namespace: ckaquest
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: delete-sc
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-app
  namespace: ckaquest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db-app
  template:
    metadata:
      labels:
        app: db-app
    spec:
      containers:
        - name: db-app
          image: busybox:1.36
          command: ["sh", "-c", "echo 'critical data' > /data/important.txt && sleep 3600"]
          volumeMounts:
            - name: data-vol
              mountPath: /data
      volumes:
        - name: data-vol
          persistentVolumeClaim:
            claimName: important-data
