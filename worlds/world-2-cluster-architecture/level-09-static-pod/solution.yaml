apiVersion: v1
kind: Pod
metadata:
  name: infra-monitor
  namespace: kube-system
  labels:
    tier: control-plane
    component: infra-monitor
spec:
  restartPolicy: Always     # Fixed: static pods require Always
  hostNetwork: true
  containers:
    - name: monitor
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]  # Fixed: "sh" not "shh"
      resources:
        requests:
          cpu: 10m
          memory: 16Mi

# Place this at: /etc/kubernetes/manifests/infra-monitor.yaml
# kubelet will detect the change and restart the pod automatically.
