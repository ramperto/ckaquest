apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-deployer
  namespace: ckaquest
---
apiVersion: v1
kind: Pod
metadata:
  name: rbac-test
  namespace: ckaquest
  labels:
    app: rbac-test
spec:
  serviceAccountName: app-deployer
  containers:
    - name: kubectl
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]
# NOTE: The ServiceAccount app-deployer exists and the pod runs fine,
# but there is NO Role or RoleBinding — the SA has zero permissions.
# Running "kubectl auth can-i list pods" from inside the pod will fail.
