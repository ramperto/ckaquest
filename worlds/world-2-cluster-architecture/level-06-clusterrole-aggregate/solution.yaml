# Add the aggregation label to logs-reader:
#
#   kubectl label clusterrole logs-reader \
#     rbac.ckaquest.io/aggregate-to-platform-viewer=true
#
# Or patch it:
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: logs-reader
  labels:
    rbac.ckaquest.io/aggregate-to-platform-viewer: "true"   # Added
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
