apiVersion: v1
kind: ResourceQuota
metadata:
  name: tight-quota
  namespace: ckaquest
spec:
  hard:
    pods: "2"                    # Only 2 pods allowed — deployment needs 3
    requests.cpu: "200m"
    requests.memory: "256Mi"
    limits.cpu: "500m"
    limits.memory: "512Mi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  namespace: ckaquest
spec:
  replicas: 3
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      containers:
        - name: webapp
          image: nginx:1.25
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
