apiVersion: v1
kind: ServiceAccount
metadata:
  name: debug-sa
  namespace: ckaquest
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: debug-role
  namespace: ckaquest
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: debug-binding
  namespace: ckaquest
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: debug-role
subjects:
  - kind: ServiceAccount
    name: debug-sa
    namespace: ckaquest
---
apiVersion: v1
kind: Pod
metadata:
  name: debug-pod
  namespace: ckaquest
  labels:
    app: debug-pod
spec:
  serviceAccountName: debug-sa
  containers:
    - name: curl
      image: curlimages/curl:8.5.0
      command: ["sleep", "3600"]
      env:
        - name: KUBERNETES_SERVICE_HOST
          value: "10.99.99.99"              # WRONG! This is not the real API server
        - name: KUBERNETES_SERVICE_PORT
          value: "6443"
