# A standalone pod (no controller) + a DaemonSet
# Both cause kubectl drain to fail without extra flags
apiVersion: v1
kind: Pod
metadata:
  name: standalone-app
  namespace: ckaquest
  labels:
    app: standalone
spec:
  containers:
    - name: app
      image: nginx:1.25
      resources:
        requests:
          cpu: 50m
          memory: 32Mi
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: log-agent
  namespace: ckaquest
spec:
  selector:
    matchLabels:
      app: log-agent
  template:
    metadata:
      labels:
        app: log-agent
    spec:
      tolerations:
        - operator: Exists
      containers:
        - name: agent
          image: busybox:1.36
          command: ["sh", "-c", "sleep 3600"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
