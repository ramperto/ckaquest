# Headless Service: clusterIP: None → DNS returns individual pod A records
apiVersion: v1
kind: Service
metadata:
  name: db-headless
  namespace: ckaquest
spec:
  clusterIP: None          # ← this is what makes it headless
  selector:
    app: db-cluster
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db-cluster
  namespace: ckaquest
spec:
  serviceName: db-headless
  replicas: 3
  selector:
    matchLabels:
      app: db-cluster
  template:
    metadata:
      labels:
        app: db-cluster
    spec:
      containers:
        - name: db
          image: postgres:15-alpine
          env:
            - name: POSTGRES_PASSWORD
              value: "secret"
          ports:
            - containerPort: 5432
---
apiVersion: v1
kind: Pod
metadata:
  name: client
  namespace: ckaquest
  labels:
    app: client
spec:
  containers:
    - name: client
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]
