apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  namespace: ckaquest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      containers:
        - name: webapp
          image: nginx:1.25
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
# No Service exists yet — you must create one.
