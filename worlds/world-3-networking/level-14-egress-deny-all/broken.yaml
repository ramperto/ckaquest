# Web Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: ckaquest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
---
# API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: ckaquest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
---
# API Service
apiVersion: v1
kind: Service
metadata:
  name: api-svc
  namespace: ckaquest
spec:
  selector:
    app: api
  ports:
    - port: 80
      targetPort: 80
---
# BUG: egress: [] means DENY ALL egress — blocks everything including DNS
# Intent was to allow egress to api pods on port 80, but empty array
# denies all outbound connections.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: web-egress
  namespace: ckaquest
spec:
  podSelector:
    matchLabels:
      app: web
  policyTypes:
    - Egress
  egress: []               # BUG: empty array = deny ALL egress
