apiVersion: v1
kind: Pod
metadata:
  name: app
  namespace: ckaquest
  labels:
    app: metrics-app
spec:
  containers:
    - name: app
      image: nginx:1.25
      ports:
        - containerPort: 80
      command:
        - sh
        - -c
        - |
          # Serve a fake /metrics endpoint on port 8080
          while true; do
            echo -e "HTTP/1.1 200 OK\r\nContent-Length: 22\r\n\r\n# HELP requests total" | nc -l -p 8080
          done
---
apiVersion: v1
kind: Service
metadata:
  name: app-svc
  namespace: ckaquest
spec:
  selector:
    app: metrics-app
  ports:
    - port: 8080
      targetPort: 8080
---
# Deny all ingress to metrics-app
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: metrics-deny-all
  namespace: ckaquest
spec:
  podSelector:
    matchLabels:
      app: metrics-app
  policyTypes:
    - Ingress
  ingress: []
