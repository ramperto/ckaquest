apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: ckaquest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: nginx:1.25
          ports:
            - containerPort: 80      # nginx listens on 80
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: ckaquest
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 80
      targetPort: 8080               # BUG: nginx is on 80, not 8080
---
# Client pod to test connectivity
apiVersion: v1
kind: Pod
metadata:
  name: client
  namespace: ckaquest
  labels:
    app: client
spec:
  containers:
    - name: client
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]
