# Backend Deployment — unchanged
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: ckaquest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        tier: api
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
---
# Fixed: selector corrected from "backendd" to "backend"
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: ckaquest
spec:
  selector:
    app: backend           # fixed typo
  ports:
    - port: 80
      targetPort: 80
