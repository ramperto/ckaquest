# The app pod connects to 'database' as its host.
# A Service named 'database' must exist and resolve to legacy-db.corp.internal
apiVersion: v1
kind: Pod
metadata:
  name: app
  namespace: ckaquest
  labels:
    app: myapp
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]
      env:
        - name: DB_HOST
          value: "database"      # Uses the k8s service name
