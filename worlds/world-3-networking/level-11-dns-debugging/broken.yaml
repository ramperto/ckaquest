# web-app Deployment + Service — these are fine
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  namespace: ckaquest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: web-svc
  namespace: ckaquest
spec:
  selector:
    app: web-app
  ports:
    - port: 80
      targetPort: 80
---
# BUG: dnsPolicy: None with a WRONG nameserver (10.0.0.1)
# The CoreDNS ClusterIP on k3s is usually 10.43.0.10.
# With dnsPolicy: None, Kubernetes does NOT inject any DNS config
# automatically — the pod relies entirely on the dnsConfig block.
# Since 10.0.0.1 is not a valid DNS server, all lookups time out.
apiVersion: v1
kind: Pod
metadata:
  name: dns-client
  namespace: ckaquest
  labels:
    app: dns-client
spec:
  containers:
    - name: client
      image: busybox:1.36
      command: ["sleep", "3600"]
  dnsPolicy: None
  dnsConfig:
    nameservers:
      - "10.0.0.1"
    searches:
      - ckaquest.svc.cluster.local
      - svc.cluster.local
      - cluster.local
