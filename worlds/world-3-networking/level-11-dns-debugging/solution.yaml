# Fix: change dnsPolicy to ClusterFirst and remove the broken dnsConfig.
# ClusterFirst tells kubelet to use the cluster's CoreDNS for resolution.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  namespace: ckaquest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: web-svc
  namespace: ckaquest
spec:
  selector:
    app: web-app
  ports:
    - port: 80
      targetPort: 80
---
# Fixed: dnsPolicy: ClusterFirst — no dnsConfig override needed
apiVersion: v1
kind: Pod
metadata:
  name: dns-client
  namespace: ckaquest
  labels:
    app: dns-client
spec:
  containers:
    - name: client
      image: busybox:1.36
      command: ["sleep", "3600"]
  dnsPolicy: ClusterFirst
