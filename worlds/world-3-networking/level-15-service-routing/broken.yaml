# Frontend Deployment — BUG: readinessProbe path /healthz returns 404 on nginx
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: ckaquest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        version: v1
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /healthz       # BUG: nginx doesn't serve /healthz — returns 404
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
---
# BUG: selector has typo "frontned" instead of "frontend"
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  namespace: ckaquest
spec:
  type: NodePort
  selector:
    app: frontned              # TYPO: should be "frontend"
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
