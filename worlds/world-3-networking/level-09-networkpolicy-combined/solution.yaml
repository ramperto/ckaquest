# Zero-trust NetworkPolicies for 3-tier app
# Rule: frontend → backend:80, backend → db:5432, nothing else

# 1. Frontend: deny all ingress, allow egress to backend:80 + DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-policy
  namespace: ckaquest
spec:
  podSelector:
    matchLabels:
      tier: frontend
  policyTypes:
    - Ingress
    - Egress
  ingress: []   # no inbound traffic to frontend
  egress:
    - to:
        - podSelector:
            matchLabels:
              tier: backend
      ports:
        - protocol: TCP
          port: 80
    - ports:    # DNS
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# 2. Backend: allow ingress from frontend:80, egress to db:5432 + DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-policy
  namespace: ckaquest
spec:
  podSelector:
    matchLabels:
      tier: backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              tier: frontend
      ports:
        - protocol: TCP
          port: 80
  egress:
    - to:
        - podSelector:
            matchLabels:
              tier: database
      ports:
        - protocol: TCP
          port: 5432
    - ports:    # DNS
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# 3. Database: allow ingress from backend:5432 only, no egress needed
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: db-policy
  namespace: ckaquest
spec:
  podSelector:
    matchLabels:
      tier: database
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              tier: backend
      ports:
        - protocol: TCP
          port: 5432
  egress: []   # db initiates no outbound connections
