# 3-tier app — all running with no NetworkPolicies (default allow)
apiVersion: v1
kind: Pod
metadata:
  name: frontend
  namespace: ckaquest
  labels:
    app: frontend
    tier: frontend
spec:
  containers:
    - name: frontend
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]
---
apiVersion: v1
kind: Pod
metadata:
  name: backend
  namespace: ckaquest
  labels:
    app: backend
    tier: backend
spec:
  containers:
    - name: backend
      image: nginx:1.25
      ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: ckaquest
spec:
  selector:
    app: backend
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: v1
kind: Pod
metadata:
  name: db
  namespace: ckaquest
  labels:
    app: db
    tier: database
spec:
  containers:
    - name: db
      image: postgres:15-alpine
      env:
        - name: POSTGRES_PASSWORD
          value: "secret"
      ports:
        - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: db-svc
  namespace: ckaquest
spec:
  selector:
    app: db
  ports:
    - port: 5432
      targetPort: 5432
# YOUR TASK: Apply NetworkPolicies to enforce tier-based traffic rules
